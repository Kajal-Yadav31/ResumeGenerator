{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
    Login User
{% endblock %}

{% block content %}

<div class="container" style="background-color:  wheat; height:100vh ; padding: 1rem ">
    
    
    <div class="content-section"; "margin-top: 4rem; height:100vh;">
        <form method="POST">
            {% csrf_token %}
            <fieldset class="form-group">
                <legend class="border-bottom mb-4">Log In</legend>
                {{ form }}
            </fieldset>
            <div class="form-group">
                <button class="btn-outline-info" type="submit">Login </button>
            </div>
        </form>
        <div class="border-top pt-3">
            <small class="text-muted">
                Neee An Account? <a class="ml-2" href="{% url 'register' %}">Sign Up </a>
            </small>
        </div>    
    </div>
</div>

{% endblock %}



{% comment %} 
<form method="POST">
    {% csrf_token %}
    {{ form }}
    <button type="submit">Login</button>
</form> {% endcomment %}
